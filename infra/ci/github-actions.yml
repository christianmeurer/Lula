name: CI

on:
  push:
    branches: [master, "feat/**"]
  pull_request:
    branches: [master]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --project ./py --python 3.12
      - name: Lint (ruff)
        run: cd py && uv run ruff check src/ tests/
      - name: Type check (mypy)
        run: cd py && uv run mypy src/
      - name: Test
        run: cd py && uv run pytest tests/ -x -q --tb=short

  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Clippy
        run: cd rs && cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cd rs && cargo test --all
      - name: Format check
        run: cd rs && cargo fmt --check

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build combined image
        run: docker build -t lg-orch:ci .
      - name: Build Python-only image
        run: docker build -f Dockerfile.python -t lg-orch-python:ci .
