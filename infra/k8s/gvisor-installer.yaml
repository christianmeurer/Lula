apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gvisor-installer
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: gvisor-installer
  template:
    metadata:
      labels:
        app: gvisor-installer
    spec:
      nodeSelector:
        sandbox: gvisor
      tolerations:
        - key: sandbox
          operator: Equal
          value: gvisor
          effect: NoSchedule
      hostPID: true
      initContainers:
        - name: installer
          image: ubuntu:22.04
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-root
              mountPath: /host
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              apt-get update -qq && apt-get install -y -qq curl util-linux
              curl -fsSL https://storage.googleapis.com/gvisor/releases/release/latest/x86_64/runsc \
                -o /host/usr/local/sbin/runsc
              chmod 755 /host/usr/local/sbin/runsc
              if ! grep -q 'io.containerd.runsc.v1' /host/etc/containerd/config.toml 2>/dev/null; then
                cat >> /host/etc/containerd/config.toml <<'EOF'

                [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runsc]
                  runtime_type = "io.containerd.runsc.v1"
              EOF
              fi
              containerd_pid=""
              if [ -f /host/run/containerd/containerd.pid ]; then
                containerd_pid="$(cat /host/run/containerd/containerd.pid 2>/dev/null || true)"
              fi
              if [ -z "${containerd_pid}" ]; then
                for proc_dir in /proc/[0-9]*; do
                  [ -r "${proc_dir}/comm" ] || continue
                  if [ "$(cat "${proc_dir}/comm" 2>/dev/null)" = "containerd" ]; then
                    containerd_pid="${proc_dir#/proc/}"
                    break
                  fi
                done
              fi
              if [ -z "${containerd_pid}" ]; then
                echo "containerd process not found in shared host PID namespace" >&2
                exit 1
              fi
              kill -0 "${containerd_pid}"
              kill -TERM "${containerd_pid}"
      containers:
        - name: pause
          image: gcr.io/pause:3.9
          command: ["/pause"]
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
